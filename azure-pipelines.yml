trigger:
  branches:
    include:
      - develop
      - main
  paths:
    exclude:
      - README.md
      - docs/*
      - '**/*.md'

pr:
  branches:
    include:
      - develop
      - main
  paths:
    exclude:
      - README.md
      - docs/*
      - '**/*.md'

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '10.0.x'
  solutionPath: 'Gauss.slnx'

  buildingBlocksUnitTestProject: 'tests/UnitTests/Gauss.BuildingBlocks.UnitTests/Gauss.BuildingBlocks.UnitTests.csproj'
  identityUnitTestProject: 'tests/UnitTests/Gauss.Identity.UnitTests/Gauss.Identity.UnitTests.csproj'
  identityInfrastructureTestProject: 'tests/IntegrationTests/Gauss.Identity.InfrastructureTests/Gauss.Identity.InfrastructureTests.csproj'
  identityApiTestProject: 'tests/IntegrationTests/Gauss.Identity.ApiTests/Gauss.Identity.ApiTests.csproj'

  sqlServerPassword: 'Asd123!!!'

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildBackend
        displayName: 'Build Backend'
        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - script: dotnet --info
            displayName: 'Show .NET information'

          - script: dotnet restore "$(solutionPath)"
            displayName: 'Restore solution'

          - script: dotnet build "$(solutionPath)" --configuration "$(buildConfiguration)" --no-restore
            displayName: 'Build solution'

  - stage: UnitTests
    displayName: 'Unit Tests'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: RunUnitTests
        displayName: 'Run Unit Tests'
        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - script: dotnet restore "$(solutionPath)"
            displayName: 'Restore solution'

          - script: |
              dotnet test "$(buildingBlocksUnitTestProject)" \
                --configuration "$(buildConfiguration)" \
                --logger "trx;LogFilePrefix=building-blocks-unit-tests" \
                --results-directory "$(Agent.TempDirectory)/TestResults/UnitTests/BuildingBlocks" \
                --collect:"XPlat Code Coverage"
            displayName: 'Run BuildingBlocks unit tests'

          - script: |
              dotnet test "$(identityUnitTestProject)" \
                --configuration "$(buildConfiguration)" \
                --logger "trx;LogFilePrefix=identity-unit-tests" \
                --results-directory "$(Agent.TempDirectory)/TestResults/UnitTests/Identity" \
                --collect:"XPlat Code Coverage"
            displayName: 'Run Identity unit tests'

          - task: PublishTestResults@2
            displayName: 'Publish unit test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/UnitTests/**/*.trx'
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish unit test coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/UnitTests/**/coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'

  - stage: IntegrationTests
    displayName: 'Integration and API Tests'
    dependsOn: UnitTests
    condition: succeeded()
    jobs:
      - job: RunIntegrationAndApiTests
        displayName: 'Run Integration and API Tests'
        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - script: dotnet restore "$(solutionPath)"
            displayName: 'Restore solution'

          - script: |
              docker --version
              docker compose version
            displayName: 'Show Docker information'

          - script: |
              docker compose up -d
              docker compose ps
            displayName: 'Start integration test dependencies'

          - script: |
              echo "Waiting for SQL Server to be ready..."

              for i in {1..90}; do
                if docker logs gauss-sqlserver 2>&1 | grep -q "SQL Server is now ready for client connections"; then
                  echo "SQL Server is ready."
                  exit 0
                fi

                echo "SQL Server is not ready yet. Attempt $i/90..."
                sleep 2
              done

              echo "SQL Server did not become ready in time."
              docker compose ps
              docker logs gauss-sqlserver
              exit 1
            displayName: 'Wait for SQL Server'

          - script: |
              echo "Waiting for Redis to be ready..."

              for i in {1..60}; do
                if docker exec gauss-redis redis-cli ping | grep -q "PONG"; then
                  echo "Redis is ready."
                  exit 0
                fi

                echo "Redis is not ready yet. Attempt $i/60..."
                sleep 1
              done

              echo "Redis did not become ready in time."
              docker compose ps
              docker logs gauss-redis
              exit 1
            displayName: 'Wait for Redis'

          - script: |
              dotnet test "$(identityInfrastructureTestProject)" \
                --configuration "$(buildConfiguration)" \
                --logger "trx;LogFilePrefix=identity-infrastructure-tests" \
                --results-directory "$(Agent.TempDirectory)/TestResults/IntegrationTests/Infrastructure" \
                --collect:"XPlat Code Coverage"
            displayName: 'Run Identity infrastructure tests'
            env:
              GAUSS_TEST_SQLSERVER_HOST: 'localhost,1433'
              GAUSS_TEST_SQLSERVER_USER: 'sa'
              GAUSS_TEST_SQLSERVER_PASSWORD: '$(sqlServerPassword)'
              GAUSS_TEST_REDIS_CONNECTION_STRING: 'localhost:6379,abortConnect=false,allowAdmin=true'

          - script: |
              dotnet test "$(identityApiTestProject)" \
                --configuration "$(buildConfiguration)" \
                --logger "trx;LogFilePrefix=identity-api-tests" \
                --results-directory "$(Agent.TempDirectory)/TestResults/IntegrationTests/Api" \
                --collect:"XPlat Code Coverage"
            displayName: 'Run Identity API tests'
            env:
              GAUSS_TEST_SQLSERVER_HOST: 'localhost,1433'
              GAUSS_TEST_SQLSERVER_USER: 'sa'
              GAUSS_TEST_SQLSERVER_PASSWORD: '$(sqlServerPassword)'
              GAUSS_TEST_REDIS_CONNECTION_STRING: 'localhost:6379,abortConnect=false,allowAdmin=true'

          - task: PublishTestResults@2
            displayName: 'Publish integration and API test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/IntegrationTests/**/*.trx'
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish integration and API test coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/IntegrationTests/**/coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'

          - script: |
              docker compose down -v --remove-orphans
            displayName: 'Stop integration test dependencies'
            condition: always()