trigger:
  branches:
    include:
      - develop
      - main
  paths:
    exclude:
      - README.md
      - docs/*
      - '**/*.md'

pr:
  branches:
    include:
      - develop
      - main
  paths:
    exclude:
      - README.md
      - docs/*
      - '**/*.md'

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '10.0.x'
  solutionPath: 'Gauss.slnx'
  sqlServerPassword: 'Asd123!!!'

resources:
  containers:
    - container: sqlserver
      image: mcr.microsoft.com/mssql/server:2022-latest
      env:
        ACCEPT_EULA: 'Y'
        MSSQL_SA_PASSWORD: $(sqlServerPassword)
      ports:
        - 1433:1433

    - container: redis
      image: redis:7-alpine
      ports:
        - 6379:6379

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildBackend
        displayName: 'Build Backend'
        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - script: dotnet --info
            displayName: 'Show .NET information'

          - script: dotnet restore "$(solutionPath)"
            displayName: 'Restore solution'

          - script: dotnet build "$(solutionPath)" --configuration "$(buildConfiguration)" --no-restore
            displayName: 'Build solution'

  - stage: UnitTests
    displayName: 'Unit Tests'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: RunUnitTests
        displayName: 'Run Unit Tests'
        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - script: dotnet restore "$(solutionPath)"
            displayName: 'Restore solution'

          - script: >
              dotnet test "$(solutionPath)"
              --configuration "$(buildConfiguration)"
              --logger "trx;LogFilePrefix=unit-tests"
              --results-directory "$(Agent.TempDirectory)/TestResults"
              --collect:"XPlat Code Coverage"
              --filter "Layer!=Infrastructure&Layer!=Api"
            displayName: 'Run unit tests'

          - task: PublishTestResults@2
            displayName: 'Publish unit test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish unit test coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'

  - stage: IntegrationTests
    displayName: 'Integration and API Tests'
    dependsOn: UnitTests
    condition: succeeded()
    jobs:
      - job: RunIntegrationTests
        displayName: 'Run Integration and API Tests'
        services:
          sqlserver: sqlserver
          redis: redis

        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - script: dotnet restore "$(solutionPath)"
            displayName: 'Restore solution'

          - script: |
              echo "Waiting for SQL Server container to be ready."

              containerId=$(docker ps --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest" --format "{{.ID}}" | head -n 1)

              if [ -z "$containerId" ]; then
                echo "SQL Server container was not found."
                docker ps
                exit 1
              fi

              echo "SQL Server container id: $containerId"

              for i in {1..60}; do
                if docker logs "$containerId" 2>&1 | grep -q "SQL Server is now ready for client connections"; then
                  echo "SQL Server is ready."
                  exit 0
                fi

                echo "SQL Server is not ready yet. Attempt $i/60..."
                sleep 2
              done

              echo "SQL Server did not become ready in time."
              docker logs "$containerId"
              exit 1
            displayName: 'Wait for SQL Server'

          - script: |
              echo "Waiting for Redis container to be ready."

              containerId=$(docker ps --filter "ancestor=redis:7-alpine" --format "{{.ID}}" | head -n 1)

              if [ -z "$containerId" ]; then
                echo "Redis container was not found."
                docker ps
                exit 1
              fi

              echo "Redis container id: $containerId"

              for i in {1..30}; do
                if docker exec "$containerId" redis-cli ping | grep -q "PONG"; then
                  echo "Redis is ready."
                  exit 0
                fi

                echo "Redis is not ready yet. Attempt $i/30..."
                sleep 1
              done

              echo "Redis did not become ready in time."
              docker logs "$containerId"
              exit 1
            displayName: 'Wait for Redis'

          - script: >
              dotnet test "$(solutionPath)"
              --configuration "$(buildConfiguration)"
              --logger "trx;LogFilePrefix=integration-tests"
              --results-directory "$(Agent.TempDirectory)/TestResults"
              --collect:"XPlat Code Coverage"
              --filter "Layer=Infrastructure|Layer=Api"
            displayName: 'Run integration and API tests'
            env:
              GAUSS_TEST_SQLSERVER_HOST: 'localhost,1433'
              GAUSS_TEST_SQLSERVER_USER: 'sa'
              GAUSS_TEST_SQLSERVER_PASSWORD: '$(sqlServerPassword)'
              GAUSS_TEST_REDIS_CONNECTION_STRING: 'localhost:6379,abortConnect=false,allowAdmin=true'

          - task: PublishTestResults@2
            displayName: 'Publish integration and API test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish integration and API test coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'